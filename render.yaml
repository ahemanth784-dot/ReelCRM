services:
  - type: web
    name: reelcrm-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm ci && npm run db:init
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
